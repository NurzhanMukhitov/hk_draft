<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 64" role="img" aria-label="AxisParts">
  <title>AxisParts — Hub</title>
  <!-- Mark: central hub with 6 spokes (multi-brand distribution) -->
  <g transform="translate(8,8)" stroke="currentColor" stroke-width="2.6" stroke-linecap="round">
    <!-- 6 spokes from (24,24), length 18 -->
    <line x1="24" y1="24" x2="42" y2="24"/>
    <line x1="24" y1="24" x2="33"  y2="8.4"/>
    <line x1="24" y1="24" x2="15"  y2="8.4"/>
    <line x1="24" y1="24" x2="6"   y2="24"/>
    <line x1="24" y1="24" x2="15"  y2="39.6"/>
    <line x1="24" y1="24" x2="33"  y2="39.6"/>
  </g>
  <!-- Center node — gold accent (Direction B trust color) -->
  <circle cx="32" cy="32" r="4.5" fill="#FFC107"/>
  <circle cx="32" cy="32" r="4.5" fill="none" stroke="currentColor" stroke-width="1.5"/>
  <!-- Wordmark -->
  <text x="72" y="42"
        font-family="'IBM Plex Sans','Inter',system-ui,-apple-system,sans-serif"
        font-size="28" font-weight="600" letter-spacing="-0.5"
        fill="currentColor">AxisParts</text>
</svg>
